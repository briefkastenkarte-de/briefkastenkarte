name: Build and deploy
on:
  workflow_dispatch:
  push:
  pull_request:
jobs:
  test-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install
        uses: ./.github/actions/install

      - name: Lint code
        run: pnpm lint

      - name: Run tests
        run: pnpm vitest run

      - name: Check types
        run: pnpm check-types

      - name: Build app
        run: pnpm build

      - name: Build API documentation
        run: pnpm build-docs

      - name: Create license report
        run: pnpm build-license-report;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist/
